# fly.toml app configuration file generated for fly-pleroma on 2026-05-29T16:57:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'fly-pleroma'
primary_region = 'yyz'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
